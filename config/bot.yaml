# bot.yaml — 机器人配置
# 支持配置多个 bot，每个 bot 独立运行

bots:
  - botId: "点点"
    # 传输模式：ws | http | hybrid（推荐 hybrid）
    # - ws     : 仅 WebSocket（只收事件，无法发 action）
    # - http   : 仅 HTTP（只发 action，无法收事件）
    # - hybrid : WS 收事件 + HTTP 发 action（推荐）
    mode: hybrid

    ws:
      url: ws://192.168.2.14:13001/
      accessToken: "lxy666666.@"
      heartbeatIntervalMs: 30000  # 默认 30s
      reconnectIntervalMs: 5000   # 默认 5s

    http:
      baseUrl: http://192.168.2.14:13000/
      accessToken: "IBC39ocS1ceznq87"
      timeoutMs: 5000             # 默认 5s

  # 多 bot 示例（取消注释即可启用）
  # - botId: "my-bot-002"
  #   mode: ws
  #   ws:
  #     url: ws://127.0.0.1:6701
  #     accessToken: another-token
