name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "packages/*/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build -w packages

      - name: Publish changed packages
        run: |
          for pkg in shared plugin-runtime config logger module-runtime sdk storage; do
            PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name")
            LOCAL_VER=$(node -p "require('./packages/$pkg/package.json').version")
            NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "none")
            if [ "$LOCAL_VER" != "$NPM_VER" ]; then
              echo "Publishing $PKG_NAME @ $LOCAL_VER (npm: $NPM_VER)..."
              npm publish -w packages/$pkg --access public --provenance
            else
              echo "Skipping $PKG_NAME @ $LOCAL_VER (already published)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
